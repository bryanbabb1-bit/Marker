name = "match-play-api"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = true

# D1 binding. Run `npm run db:create` once, then paste the returned
# database_id here before the first deploy / remote migration.
[[d1_databases]]
binding = "DB"
database_name = "match-play"
database_id = "26a94ebb-1db5-4565-8711-35c82f2bbac0"

# Profile-photo storage.
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "quell-photos"

# Per-user rate limit (mirrors TrueForecast). 300 req / 60s.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 300, period = 60 }

# Schedules (src/index.ts scheduled() branches on controller.cron):
#   "0 * * * *"   hourly — score-reminder + forfeit sweep
#   "0 7 1 * *"   1st of month 07:00 UTC — freeze last month's club champions
[triggers]
crons = ["0 * * * *", "0 7 1 * *"]

[vars]
ENVIRONMENT = "development"

[observability]
enabled = true
